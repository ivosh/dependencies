name: Publish package

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - id: check-version
        name: Check if version is SNAPSHOT
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Project version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref_type }}" == "tag" && "$VERSION" == *SNAPSHOT ]]; then
            echo "❌ ERROR: Tagged release contains SNAPSHOT version"
            exit 1
          fi

          if [[ "${{ github.ref_type }}" == "branch" && "$VERSION" != *SNAPSHOT ]]; then
            echo "❌ ERROR: Push to main requires SNAPSHOT version"
            exit 1
          fi

      - id: install-secret-key
        name: Install GPG secret key
        run: |
          echo -n "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: Publish to Maven Central (Portal)
        run: |
          set -o pipefail
          mvn --batch-mode -Pcentral -Dgpg.passphrase="$GPG_PASSPHRASE" \
              source:jar javadoc:jar -f pom.xml deploy | tee mvn.log

          # For releases, surface the deploymentId so it's easy to find in the Portal UI.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            DEP_ID=$(grep -oE 'deploymentId: [a-f0-9-]{36}' mvn.log | awk '{print $2}' | tail -n1)
            {
              echo "### Central Portal Deployment"
              echo ""
              echo "- Version: \`${{ steps.check-version.outputs.version }}\`"
              echo "- Deployment ID: \`${DEP_ID:-not-found}\`"
              echo "- [Open Deployments in Portal](https://central.sonatype.com/publishing/deployments)"
              echo ""
              echo "Click **Publish** next to the deployment to release it to Maven Central."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_PORTAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PORTAL_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish to GitHub Packages
        run: mvn --batch-mode -Pgithub source:jar javadoc:jar -f pom.xml deploy
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
